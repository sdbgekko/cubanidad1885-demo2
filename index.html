      setStatus('Error: missing bundle data');

    const manifest = JSON.parse(manifestEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

      const s = document.createElement('script');

      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);

3;\n    --ink: #241c15;\n    --ink-soft: #4a3d31;\n    --gold: #c98a2b;\n    --line: rgba(36, 28, 21, 0.16);\n    --shadow: 0 18px 50px -22px rgba(36, 28, 21, 0.55);\n    --serif: \"Bodoni Moda\", Georgia, \"Times New Roman\", serif;\n    --sans: \"Archivo\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    --maxw: 1180px;\n  }\n\n  * { box-sizing: border-box; }\n\n  html { scroll-behavior: smooth; }\n  @media (prefers-reduced-motion: reduce) {\n    html { scroll-behavior: auto; }\n    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }\n  }\n\n  body {\n    margin: 0;\n    font-family: var(--sans);\n    color: var(--ink);\n    background: var(--cream);\n    line-height: 1.6;\n    font-size: 17px;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n\n  h1, h2, h3 { font-family: var(--serif); font-weight: 700; line-height: 1.05; margin: 0; letter-spacing: -0.01em; }\n\n  a { color: var(--terracotta-deep); }\n\n  img { max-width: 100%; display: block; }\n\n  /* ============ ACCESS ============ */\n  .skip {\n    position: absolute; left: 12px; top: -60px;\n    background: var(--ink); color: var(--cream);\n    padding: 12px 18px; border-radius: 6px; z-index: 200;\n    text-decoration: none; font-weight: 600; transition: top 0.18s ease;\n  }\n  .skip:focus { top: 12px; }\n\n  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, summary:focus-visible {\n    outline: 3px solid var(--gold);\n    outline-offset: 3px;\n    border-radius: 4px;\n  }\n\n  /* ============ LAYOUT ============ */\n  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 22px; }\n\n  .eyebrow {\n    font-family: var(--sans);\n    font-weight: 700;\n    font-size: 0.74rem;\n    letter-spacing: 0.26em;\n    text-transform: uppercase;\n    margin: 0 0 14px;\n    display: inline-flex; align-items: center; gap: 12px;\n    color: var(--terracotta-deep);\n  }\n  .eyebrow::before {\n    content: \"\"; width: 30px; height: 2px; background: currentColor; display: inline-block;\n  }\n  .eyebrow.center { justify-content: center; }\n\n  /* ============ BUTTONS ============ */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n    min-height: 50px; padding: 13px 26px;\n    font-family: var(--sans); font-weight: 700; font-size: 0.92rem;\n    letter-spacing: 0.04em; text-transform: uppercase;\n    border-radius: 4px; border: 2px solid transparent;\n    text-decoration: none; cursor: pointer; transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;\n  }\n  .btn:active { transform: translateY(1px); }\n  .btn--primary { background: var(--terracotta); color: #fff5e9; box-shadow: var(--shadow); }\n  .btn--primary:hover { background: var(--terracotta-deep); }\n  .btn--ghost { background: transparent; color: var(--cream); border-color: rgba(244, 234, 216, 0.6); }\n  .btn--ghost:hover { background: rgba(244, 234, 216, 0.14); border-color: var(--cream); }\n  .btn--dark { background: var(--teal); color: var(--cream); }\n  .btn--dark:hover { background: var(--teal-deep); }\n\n  /* ============ PROMO ============ */\n  .promo {\n    background: var(--terracotta); color: #fff5e9; text-align: center;\n    padding: 13px 22px; font-weight: 700; letter-spacing: 0.03em; font-size: 0.95rem;\n  }\n  .promo b { font-family: var(--serif); font-weight: 800; letter-spacing: 0; font-size: 1.05rem; }\n\n  /* ============ HEADER ============ */\n  .site-header {\n    position: sticky; top: 0; z-index: 100;\n    background: rgba(244, 234, 216, 0.92);\n    backdrop-filter: blur(8px);\n    border-bottom: 1px solid transparent;\n    transition: box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;\n  }\n  .site-header.scrolled {\n    box-shadow: 0 8px 30px -18px rgba(36,28,21,0.45);\n    border-bottom-color: var(--line);\n  }\n  .nav {\n    display: flex; align-items: center; justify-content: space-between;\n    min-height: 72px; gap: 18px;\n  }\n  .brand {\n    display: flex; flex-direction: column; line-height: 1; text-decoration: none; color: var(--ink);\n  }\n  .brand b { font-family: var(--serif); font-weight: 800; font-size: 1.42rem; letter-spacing: -0.01em; }\n  .brand span { font-size: 0.6rem; letter-spacing: 0.34em; text-transform: uppercase; color: var(--terracotta-deep); font-weight: 700; margin-top: 4px; }\n\n  .nav-links { display: flex; align-items: center; gap: 6px; list-style: none; margin: 0; padding: 0; }\n  .nav-links a {\n    color: var(--ink); text-decoration: none; font-weight: 600; font-size: 0.92rem;\n    padding: 10px 14px; border-radius: 4px; min-height: 44px; display: inline-flex; align-items: center;\n    transition: color 0.18s ease, background 0.18s ease;\n  }\n  .nav-links a:hover { color: var(--terracotta-deep); background: rgba(173, 63, 35, 0.08); }\n  .nav-cta { margin-left: 10px; }\n\n  .nav-toggle {\n    display: none;\n    width: 48px; height: 48px; border: 1px solid var(--line); border-radius: 6px;\n    background: transparent; cursor: pointer; align-items: center; justify-content: center;\n    color: var(--ink);\n  }\n  .nav-toggle svg { width: 24px; height: 24px; }\n  .nav-toggle .ic-close { display: none; }\n  .nav-toggle[aria-expanded=\"true\"] .ic-open { display: none; }\n  .nav-toggle[aria-expanded=\"true\"] .ic-close { display: block; }\n\n  /* ============ HERO ============ */\n  .hero {\n    position: relative;\n    background: var(--teal-deep);\n    color: var(--cream);\n    overflow: hidden;\n  }\n  .hero-media {\n    position: absolute; inset: 0;\n    background:\n      linear-gradient(120deg, rgba(10,54,51,0.94) 0%, rgba(10,54,51,0.66) 46%, rgba(140,48,25,0.5) 100%),\n      repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 13px),\n      var(--teal-deep);\n  }\n  .hero-inner {\n    position: relative;\n    padding: clamp(72px, 13vw, 150px) 0 clamp(60px, 9vw, 110px);\n    max-width: 760px;\n  }\n  .hero h1 {\n    font-size: clamp(3.1rem, 11vw, 6.6rem);\n    line-height: 0.92;\n    color: #fbf3e4;\n    margin: 6px 0 0;\n  }\n  .hero h1 em { font-style: italic; color: var(--gold); display: block; }\n  .hero .eyebrow { color: var(--gold); }\n  .hero-tag {\n    font-size: clamp(1.05rem, 2.6vw, 1.4rem);\n    max-width: 480px; margin: 26px 0 0; color: rgba(244,234,216,0.9);\n    font-weight: 400;\n  }\n  .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 38px; }\n  .hero-meta {\n    display: flex; flex-wrap: wrap; gap: 10px 30px; margin-top: 46px;\n    padding-top: 26px; border-top: 1px solid rgba(244,234,216,0.22);\n    font-size: 0.82rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(244,234,216,0.78);\n  }\n  .hero-meta b { color: var(--gold); font-family: var(--sans); }\n\n  /* ============ SECTION SHELLS ============ */\n  section[id] { scroll-margin-top: 84px; }\n  .band { padding: clamp(64px, 10vw, 120px) 0; }\n  .band--cream { background: var(--cream); }\n  .band--paper { background: var(--paper); }\n  .band--teal { background: var(--teal); color: var(--cream); }\n  .band--teal .eyebrow { color: var(--gold); }\n  .band--teal h2 { color: #fbf3e4; }\n\n  .section-head { max-width: 640px; }\n  .section-head.center { margin: 0 auto; text-align: center; }\n  .section-head h2 { font-size: clamp(2.1rem, 5.6vw, 3.5rem); }\n  .section-head p { color: var(--ink-soft); font-size: 1.06rem; margin: 18px 0 0; }\n  .band--teal .section-head p { color: rgba(244,234,216,0.82); }\n\n  /* ============ ABOUT ============ */\n  .about-grid {\n    display: grid; grid-template-columns: 1fr; gap: 44px; align-items: center;\n    margin-top: 14px;\n  }\n  .about-copy p { color: var(--ink-soft); margin: 0 0 18px; }\n  .about-copy p.lead { font-size: 1.22rem; color: var(--ink); line-height: 1.5; }\n  .about-sign {\n    font-family: var(--serif); font-style: italic; font-size: 1.5rem; color: var(-- n  /* ============ RESPONSIVE ============ */\n  @media (min-width: 720px) {\n    .about-grid { grid-template-columns: 1.05fr 0.95fr; }\n    .menu-grid { grid-template-columns: 1fr 1fr; gap: 0 56px; }\n    .loc-grid { grid-template-columns: repeat(3, 1fr); }\n    .gallery { grid-template-columns: repeat(4, 1fr); }\n    .foot-grid { grid-template-columns: 1.4fr 1fr 1fr 1fr; }\n  }\n\n  @media (max-width: 860px) {\n    .nav-cta { display: none; }\n    .nav-toggle { display: inline-flex; }\n    .nav-links {\n      position: fixed; inset: 72px 0 auto 0;\n      flex-direction: column; align-items: stretch; gap: 0;\n      background: var(--paper); border-bottom: 1px solid var(--line);\n      padding: 10px 22px 22px; box-shadow: var(--shadow);\n      transform: translateY(-130%); transition: transform 0.3s ease; visibility: hidden;\n    }\n    .nav-links.open { transform: none; visibility: visible; }\n    .nav-links a { padding: 14px 6px; font-size: 1.05rem; border-bottom: 1px solid var(--line); }\n    .nav-links .nav-cta { display: flex; margin: 16px 0 0; }\n    .nav-links .nav-cta .btn { width: 100%; }\n  }\n\n<style id="real-photos">\n.ph__tag{display:none !important;}\n.ph{background-image:none;}\nfigure[aria-label*="chef Dennis"]{background:url('https://images.unsplash.com/photo-1577219491135-ce391730fb2c?auto=format&fit=crop&w=1200&q=80') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="Cubano sandwich"]{background:url('https://images.unsplash.com/photo-1528735602780-2552fd46c7af?auto=format&fit=crop&w=1200&q=80') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="ropa vieja"]{background:url('https://images.pexels.com/photos/29450677/pexels-photo-29450677.jpeg?auto=compress&cs=tinysrgb&w=1200') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="Tostones"]{background:url('https://images.pexels.com/photos/37297540/pexels-photo-37297540.jpeg?auto=compress&cs=tinysrgb&w=1200') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="Café cubano being poured"]{background:url('https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?auto=format&fit=crop&w=1200&q=80') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="dining room at dusk"]{background:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1200&q=80') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="dominoes"]{background:url('https://images.unsplash.com/photo-1606851091851-e8c8c0fca5ba?auto=format&fit=crop&w=1200&q=80') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\nfigure[aria-label*="trumpet player"]{background:url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?auto=format&fit=crop&w=1200&q=80') center center / cover no-repeat !important; border:1px solid var(--line) !important;}\n<\u002Fstyle><\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<a class=\"skip\" href=\"#main\">Skip to main content<\u002Fa>\n\n<header class=\"site-header\" id=\"top\">\n  <div class=\"wrap\">\n    <nav class=\"nav\" aria-label=\"Primary\">\n      <a class=\"brand\" href=\"#top\" aria-label=\"Cubanidad 1885 home\">\n        <b>Cubanidad <span style=\"color:var(--terracotta-deep);\">1885<\u002Fspan><\u002Fb>\n        <span>Authentic Cuban · Las Vegas<\u002Fspan>\n      <\u002Fa>\n      <button class=\"nav-toggle\" id=\"navToggle\" aria-expanded=\"false\" aria-controls=\"navLinks\" aria-label=\"Open menu\">\n        <svg class=\"ic-open\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" aria-hidden=\"true\"><path d=\"M3 6h18M3 12h18M3 18h18\"><\u002Fpath><\u002Fsvg>\n        <svg class=\"ic-close\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" aria-hidden=\"true\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <ul class=\"nav-links\" id=\"navLinks\">\n        <li><a href=\"#about\">Our Story<\u002Fa><\u002Fli>\n        <li><a href=\"#menu\">Menu<\u002Fa><\u002Fli>\n        <li><a href=\"#gallery\">Gallery<\u002Fa><\u002Fli>\n        <li><a href=\"#locations\">Locations<\u002Fa><\u002Fli>\n        <li class=\"nav-cta\"><a class=\"btn btn--primary\" href=\"#locations\">Order Online<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"main\">\n\n  <!-- HERO -->\n  <section class=\"hero\" aria-labelledby=\"hero-title\">\n    <div class=\"hero-media\" role=\"img\" aria-label=\"Warm, dimly lit Havana-style dining room — placeholder for a hero photograph\"><\u002Fdiv>\n    <div class=\"wrap\">\n      <div class=\"hero-inner\">\n        <p class=\"eyebrow\">Serving the family table since 1885<\u002Fp>\n        <h1 id=\"hero-title\">Cubanidad <em>1885<\u002Fem><\u002Fh1>\n        <p class=\"hero-tag\">Authentic Cuban, three tables in Las Vegas. Slow-roasted lechón, citrus-bright sofrito, and café cubano poured the way Abuela taught us.<\u002Fp>\n        <div class=\"hero-actions\">\n          <a class=\"btn btn--primary\" href=\"#locations\">Order Online<\u002Fa>\n          <a class=\"btn btn--ghost\" href=\"#menu\">View the Menu<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"hero-meta\">\n          <span>Open 7 Days · <b>Lunch &amp; Dinner<\u002Fb><\u002Fspan>\n          <span>Three Tables · <b>Summerlin · Henderson · Sahara<\u002Fb><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <aside class=\"promo\" aria-label=\"Current promotion\">\n    <span><b>305 Wednesdays<\u002Fb> — Buy one 305, get a second for $5.<\u002Fspan>\n  <\u002Faside>\n\n  <!-- ABOUT -->\n  <section class=\"band band--cream\" id=\"about\" aria-labelledby=\"about-title\">\n    <div class=\"wrap\">\n      <div class=\"about-grid\">\n        <div class=\"about-copy reveal\">\n          <p class=\"eyebrow\">Our Story · Nuestra Historia<\u002Fp>\n          <h2 id=\"about-title\" style=\"font-size:clamp(2.1rem,5.6vw,3.4rem);\">Real Cuban home cooking, brought to Las Vegas<\u002Fh2>\n          <p class=\"lead\">Cubanidad 1885 is the table of chef <strong>Dennis Martinez Miranda<\u002Fstrong> — born in Cuba, where he first learned to cook at his mother's side as a child.<\u002Fp>\n          <p>That childhood kitchen never left him. He went on to train at <strong>Le Cordon Bleu in Miami<\u002Fstrong>, sharpening the technique while keeping the soul of the island intact — the same trinity of garlic, sour orange, and patience behind every dish.<\u002Fp>\n          <p>Today he brings that authentic Cuban home cooking to three tables across the Las Vegas valley. Small enough to know your name, generous enough to send you home full.<\u002Fp>\n          <blockquote class=\"about-sign\" style=\"margin:18px 0 0;border:0;\">“The real secret is in your heart — to follow your instincts.”\n            <small>Chef Dennis Martinez Miranda · Founder &amp; Executive Chef<\u002Fsmall>\n          <\u002Fblockquote>\n          <div class=\"stat-row\">\n            <div class=\"stat\"><b>3<\u002Fb><span>Las Vegas tables<\u002Fspan><\u002Fdiv>\n            <div class=\"stat\"><b>12hr<\u002Fb><span>Slow-roast lechón<\u002Fspan><\u002Fdiv>\n            <div class=\"stat\"><b style=\"font-size:1.5rem;\">Le Cordon Bleu<\u002Fb><span>Miami-trained chef<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <figure class=\"ph about-figure reveal\" role=\"img\" aria-label=\"Portrait of chef Dennis Martinez Miranda in the kitchen — placeholder for a photograph\">\n          <span class=\"ph__tag\">photo · chef-dennis-portrait.jpg<\u002Fspan>\n        <\u002Ffigure>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsectio s-marinated roast pork with mojo onions.<\u002Fp>\n            <div class=\"dish__tags\"><span class=\"tag\">House favorite<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Masitas de Cerdo<\u002Fspan>\n            <p class=\"dish__desc\">Fried marinated pork chunks, onions &amp; lime.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Arroz con Pollo<\u002Fspan>\n            <p class=\"dish__desc\">Saffron-yellow rice with tender chicken.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"menu-col reveal\">\n          <h3>Pa’ Picar / Snacks<\u002Fh3>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Croquetas<\u002Fspan>\n            <p class=\"dish__desc\">Crisp, golden ham croquettes.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Empanadas<\u002Fspan>\n            <p class=\"dish__desc\">Golden turnovers, beef or chicken.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Pastelitos<\u002Fspan>\n            <p class=\"dish__desc\">Flaky pastry filled with guava &amp; cheese.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Cuban Nachos<\u002Fspan>\n            <p class=\"dish__desc\">Plantain chips loaded Cuban-style.<\u002Fp>\n          <\u002Fdiv>\n\n          <h3 style=\"margin-top:38px;\">Dulces / Desserts<\u002Fh3>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Flan<\u002Fspan>\n            <p class=\"dish__desc\">Silky vanilla custard with burnt caramel.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"dish\">\n            <span class=\"dish__name\">Tres Leches<\u002Fspan>\n            <p class=\"dish__desc\">Three-milk sponge cake, lightly sweet.<\u002Fp>\n          <\u002Fdiv>\n\n          <h3
